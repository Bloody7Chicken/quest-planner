<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f0e17"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="#1a1828" stroke="#3d3a56" stroke-width="4"/>
  <!-- Pixel grid background -->
  <rect x="60" y="60" width="392" height="392" rx="12" fill="#232136" opacity="0.5"/>
  <!-- Sword blade -->
  <rect x="240" y="80" width="32" height="200" fill="#b0a8c8" rx="2"/>
  <rect x="240" y="80" width="16" height="200" fill="#e8e4f0" rx="2"/>
  <!-- Sword tip -->
  <polygon points="256,56 272,80 240,80" fill="#e8e4f0"/>
  <!-- Sword guard -->
  <rect x="200" y="272" width="112" height="24" rx="4" fill="#ffd866"/>
  <rect x="200" y="272" width="112" height="12" rx="4" fill="#ffe896"/>
  <!-- Sword handle -->
  <rect x="244" y="296" width="24" height="56" fill="#7c5fd6" rx="2"/>
  <rect x="244" y="296" width="12" height="56" fill="#a78bfa" rx="2"/>
  <!-- Sword pommel -->
  <circle cx="256" cy="364" r="16" fill="#ffd866"/>
  <circle cx="252" cy="360" r="8" fill="#ffe896"/>
  <!-- Shield -->
  <path d="M120,160 L120,280 Q120,360 192,400 L120,160Z" fill="#56e077" opacity="0.9"/>
  <path d="M120,160 L192,400 Q264,360 264,280 L264,160 Z" fill="#2da84a"/>
  <path d="M120,160 L264,160 L264,280 Q264,360 192,400 Q120,360 120,280Z" fill="none" stroke="#56e077" stroke-width="6"/>
  <rect x="184" y="200" width="16" height="80" fill="#ffd866" rx="2"/>
  <rect x="160" y="228" width="64" height="16" fill="#ffd866" rx="2"/>
  <!-- Stars -->
  <circle cx="360" cy="120" r="6" fill="#ffd866" opacity="0.8"/>
  <circle cx="400" cy="180" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="340" cy="380" r="5" fill="#67e8f9" opacity="0.7"/>
  <circle cx="420" cy="320" r="3" fill="#ffd866" opacity="0.5"/>
  <!-- XP text -->
  <text x="320" y="430" font-family="monospace" font-size="48" font-weight="bold" fill="#56e077" opacity="0.9">XP</text>
</svg>
